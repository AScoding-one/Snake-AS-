<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake AS</title>

<style>

body{
margin:0;
background:#0b1220;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin:15px;
text-shadow:0 0 10px #00ffff;
}

#menuBtn{
position:absolute;
left:15px;
top:15px;
font-size:30px;
cursor:pointer;
}

#menu{
position:absolute;
left:15px;
top:60px;
background:#1e293b;
padding:15px;
border-radius:10px;
display:none;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
}

#start{
background:#22c55e;
color:white;
font-size:20px;
}

canvas{
background:black;
border:3px solid cyan;
box-shadow:0 0 20px cyan;
border-radius:10px;
touch-action:none;
}

#ui{
font-size:20px;
margin:10px;
}

#pause{
display:none;
font-size:28px;
color:yellow;
}

</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="menu">
<button onclick="pauseGame()">Pause</button><br>
<button onclick="resetHighscore()">Reset Highscore</button>
</div>

<h1>🐍 Snake AS</h1>

<div id="ui">
Score: <span id="score">0</span> |
Level: <span id="level">1</span> |
Highscore: <span id="highscore">0</span>
</div>

<button id="start">Start Game</button>

<div id="pause">||PAUSED</div>

<br>

<canvas id="game" width="400" height="400"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const grid = 20

let snake
let food
let dx
let dy

let score
let level
let speed

let running=false
let paused=false

const eatSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
const loseSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg")

let highscore = localStorage.getItem("snakeHighscore") || 0
document.getElementById("highscore").innerText = highscore

document.getElementById("menuBtn").onclick = ()=>{
const m=document.getElementById("menu")
m.style.display=m.style.display==="block"?"none":"block"
}

function resetHighscore(){
highscore=0
localStorage.setItem("snakeHighscore",0)
document.getElementById("highscore").innerText=0
}

document.getElementById("start").onclick=startGame

function startGame(){

snake=[{x:200,y:200}]
dx=grid
dy=0

score=0
level=1
speed=120

spawnFood()

running=true
paused=false

}

function spawnFood(){

food={
x:Math.floor(Math.random()*20)*grid,
y:Math.floor(Math.random()*20)*grid
}

}

function pauseGame(){

paused=!paused

document.getElementById("pause").style.display =
paused?"block":"none"

}

function update(){

if(!running || paused) return

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
}

snake.unshift(head)

if(head.x===food.x && head.y===food.y){

score++
eatSound.play()

if(score%5===0){
level++
}

spawnFood()

}else{
snake.pop()
}

if(
head.x<0 ||
head.y<0 ||
head.x>=canvas.width ||
head.y>=canvas.height
){
gameOver()
}

for(let i=1;i<snake.length;i++){
if(head.x===snake[i].x && head.y===snake[i].y){
gameOver()
}
}

if(score>highscore){
highscore=score
localStorage.setItem("snakeHighscore",highscore)
}

document.getElementById("score").innerText=score
document.getElementById("level").innerText=level
document.getElementById("highscore").innerText=highscore

draw()

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(food.x+10,food.y+10,8,0,Math.PI*2)
ctx.fill()

snake.forEach((s,i)=>{

ctx.fillStyle="lime"

ctx.beginPath()
ctx.arc(s.x+10,s.y+10,9,0,Math.PI*2)
ctx.fill()

if(i===0){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(s.x+6,s.y+6,2,0,Math.PI*2)
ctx.arc(s.x+14,s.y+6,2,0,Math.PI*2)
ctx.fill()

}

})

}

function gameOver(){

running=false
loseSound.play()

setTimeout(()=>{
alert("Game Over! Score: "+score)
},100)

}

setInterval(update,100)

document.addEventListener("keydown",e=>{

if(e.key==="p") pauseGame()

if(e.key==="ArrowUp" && dy===0){dx=0;dy=-grid}
if(e.key==="ArrowDown" && dy===0){dx=0;dy=grid}
if(e.key==="ArrowLeft" && dx===0){dx=-grid;dy=0}
if(e.key==="ArrowRight" && dx===0){dx=grid;dy=0}

})

let startX,startY

canvas.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

canvas.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX
let endY=e.changedTouches[0].clientY

let dxT=endX-startX
let dyT=endY-startY

if(Math.abs(dxT)>Math.abs(dyT)){

if(dxT>0 && dx===0){dx=grid;dy=0}
else if(dxT<0 && dx===0){dx=-grid;dy=0}

}else{

if(dyT>0 && dy===0){dx=0;dy=grid}
else if(dyT<0 && dy===0){dx=0;dy=-grid}

}

})

</script>
<footer>Create and coding by AScoding :)</footer>
</body>
</html>
